name: Refresh World Cup Data

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: world-cup-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data and predictions
        run: python scripts/refresh_for_deploy.py

      - name: Commit refreshed data
        run: |
          git config user.name "world-cup-refresh-bot"
          git config user.email "actions@github.com"
          git add data/matches.json data/refresh_status.json data/latest_predictions.json data/serverless_prediction_snapshots.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh world cup prediction data"
            git push
          fi
